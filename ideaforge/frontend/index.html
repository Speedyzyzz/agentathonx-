<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IdeaForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-50 text-slate-900">
  <main class="mx-auto max-w-3xl px-4 py-10">
    <header class="mb-8">
      <h1 class="text-3xl font-bold tracking-tight">IdeaForge</h1>
      <p class="mt-2 text-sm text-slate-600">Store ideas, find connections, generate project concepts.</p>
    </header>

    <section class="grid gap-6">
      <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <h2 class="text-lg font-semibold">Add Idea</h2>
        <div class="mt-3 flex gap-2">
          <input id="ideaInput" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-slate-400" placeholder="Enter idea" />
          <button onclick="addIdea()" class="rounded-xl bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800">Save</button>
        </div>
        <p class="mt-2 text-xs text-slate-500">Tip: add 3–5 short ideas before asking.</p>
      </div>

      <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <h2 class="text-lg font-semibold">Ask AI</h2>
        <div class="mt-3 flex gap-2">
          <input id="questionInput" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-slate-400" placeholder="Ask about your ideas" />
          <button onclick="askAI()" class="rounded-xl bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-500">Ask</button>
        </div>
      </div>

      <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <div class="flex items-center justify-between gap-3">
          <h2 class="text-lg font-semibold">Results</h2>
          <button onclick="clearOutput()" class="text-xs text-slate-500 hover:text-slate-700">Clear</button>
        </div>
        <pre id="output" class="mt-3 max-h-[420px] overflow-auto rounded-xl bg-slate-950 p-4 text-xs leading-relaxed text-slate-100">{
  "status": "ready"
}</pre>
      </div>
    </section>

    <footer class="mt-10 text-xs text-slate-500">
      Backend expected at <span class="font-mono">http://127.0.0.1:8000</span>
    </footer>
  </main>

<script>
  const BASE_URL = "http://127.0.0.1:8000";

  function setOutput(obj) {
    document.getElementById("output").textContent = JSON.stringify(obj, null, 2);
  }

  function clearOutput() {
    setOutput({ status: "ready" });
  }

  async function addIdea() {
    const text = document.getElementById("ideaInput").value.trim();
    if (!text) return;

    const res = await fetch(`${BASE_URL}/add`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text }),
    });

    const data = await res.json().catch(() => ({}));
    setOutput({ action: "add", request: { text }, response: data, ok: res.ok });

    if (res.ok) document.getElementById("ideaInput").value = "";
  }

  async function askAI() {
    const question = document.getElementById("questionInput").value.trim();
    if (!question) return;

    const res = await fetch(`${BASE_URL}/ask`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question }),
    });

    const data = await res.json();
    setOutput(data);
  }
</script>

</body>
</html>
